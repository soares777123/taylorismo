<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Quiz: Taylorismo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: white;
      text-align: center;
      padding: 20px;
    }

    .quiz-container {
      background: rgba(0,0,0,0.7);
      padding: 20px;
      border-radius: 15px;
      max-width: 600px;
      margin: auto;
    }

    h1 {
      margin-bottom: 10px;
    }

    .question {
      font-size: 20px;
      margin: 20px 0;
    }

    .answers button {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      background-color: #4CAF50;
      color: white;
      transition: 0.3s;
    }

    .answers button:hover {
      background-color: #45a049;
    }

    #nextBtn {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background-color: orange;
      cursor: pointer;
      display: none;
    }

    #score {
      font-size: 22px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="quiz-container">
    <h1>Quiz sobre Taylorismo</h1>
    <div id="question" class="question"></div>
    <div id="answers" class="answers"></div>
    <button id="nextBtn">Próxima</button>
    <div id="score"></div>
  </div>

  <script>
    const quiz = [
      {
        question: "Quem foi o criador do Taylorismo?",
        answers: ["Karl Marx", "Henry Ford", "Frederick Taylor", "Adam Smith"],
        correct: 2
      },
      {
        question: "Qual era o principal objetivo do Taylorismo?",
        answers: [
          "Aumentar o lazer dos trabalhadores",
          "Aumentar a produtividade",
          "Diminuir o lucro",
          "Eliminar fábricas"
        ],
        correct: 1
      },
      {
        question: "O Taylorismo também é conhecido como:",
        answers: [
          "Produção artesanal",
          "Administração científica",
          "Socialismo industrial",
          "Capitalismo liberal"
        ],
        correct: 1
      },
      {
        question: "Uma característica do Taylorismo é:",
        answers: [
          "Trabalho livre e criativo",
          "Divisão de tarefas",
          "Fim da hierarquia",
          "Autonomia total do trabalhador"
        ],
        correct: 1
      },
      {
        question: "No Taylorismo, o trabalhador:",
        answers: [
          "Planeja e executa",
          "Só executa tarefas definidas",
          "Decide o salário",
          "Trabalha sem supervisão"
        ],
        correct: 1
      }
    ];

    let currentQuestion = 0;
    let score = 0;

    const questionEl = document.getElementById("question");
    const answersEl = document.getElementById("answers");
    const nextBtn = document.getElementById("nextBtn");
    const scoreEl = document.getElementById("score");

    function showQuestion() {
      resetState();
      let q = quiz[currentQuestion];
      questionEl.innerText = q.question;

      q.answers.forEach((answer, index) => {
        const button = document.createElement("button");
        button.innerText = answer;
        button.onclick = () => selectAnswer(index);
        answersEl.appendChild(button);
      });
    }

    function resetState() {
      nextBtn.style.display = "none";
      answersEl.innerHTML = "";
    }

    function selectAnswer(index) {
      const correct = quiz[currentQuestion].correct;

      if (index === correct) {
        score++;
        alert("✅ Resposta correta!");
      } else {
        alert("❌ Resposta errada!");
      }

      nextBtn.style.display = "block";
    }

    nextBtn.onclick = () => {
      currentQuestion++;
      if (currentQuestion < quiz.length) {
        showQuestion();
      } else {
        showScore();
      }
    };

    function showScore() {
      questionEl.innerText = "Fim do Quiz!";
      answersEl.innerHTML = "";
      nextBtn.style.display = "none";
      scoreEl.innerText = "Sua pontuação: " + score + " de " + quiz.length;
    }

    showQuestion();
  </script>

</body>
</html>
