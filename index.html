<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Taylorismo 3D</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px;
      max-width: 300px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div id="info">
  <h3>Taylorismo</h3>
  <p id="texto">Use W A S D para se mover.</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer;
let worker, task;
let keys = {};
let speed = 0.08;
let etapa = 0;

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x999999);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0,6,10);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Luz ambiente
  const ambient = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambient);

  // Luz principal
  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(10,15,10);
  scene.add(light);

  // Chão com textura simulada
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(50,50),
    new THREE.MeshStandardMaterial({
      color: 0x777777,
      roughness: 0.9
    })
  );
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);

  // Trabalhador
  worker = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({color: 0x2ecc71})
  );
  worker.position.y = 1;
  scene.add(worker);

  createTask();

  document.addEventListener("keydown", (e)=> keys[e.key.toLowerCase()] = true);
  document.addEventListener("keyup", (e)=> keys[e.key.toLowerCase()] = false);
}

function createTask() {
  if(task) scene.remove(task);

  task = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({color: 0xe74c3c})
  );

  task.position.set(
    Math.random()*10 - 5,
    0.5,
    Math.random()*10 - 5
  );

  scene.add(task);
}

function move() {
  let moving = false;

  if(keys["w"]) { worker.position.z -= speed; moving = true; }
  if(keys["s"]) { worker.position.z += speed; moving = true; }
  if(keys["a"]) { worker.position.x -= speed; moving = true; }
  if(keys["d"]) { worker.position.x += speed; moving = true; }

  // Rotação leve para direção
  if(moving){
    worker.rotation.y += 0.05;
  }

  // câmera segue o jogador
  camera.position.x = worker.position.x;
  camera.position.z = worker.position.z + 10;
  camera.lookAt(worker.position);
}

function checkCollision() {
  let dx = worker.position.x - task.position.x;
  let dz = worker.position.z - task.position.z;

  if(Math.sqrt(dx*dx + dz*dz) < 1.5) {
    etapa++;
    mostrarExplicacao();
    createTask();
  }
}

function mostrarExplicacao() {
  let texto = document.getElementById("texto");

  if(etapa === 1) {
    texto.innerHTML = "Taylorismo: organização científica do trabalho.";
  }
  else if(etapa === 2) {
    texto.innerHTML = "Divisão extrema das tarefas.";
  }
  else if(etapa === 3) {
    texto.innerHTML = "Controle do tempo e movimentos.";
  }
  else if(etapa === 4) {
    texto.innerHTML = "Foco na produtividade, não no trabalhador.";
  }
  else {
    texto.innerHTML = "Você sentiu a repetição do trabalho taylorista.";
  }
}

function animate() {
  requestAnimationFrame(animate);

  move();
  checkCollision();

  renderer.render(scene, camera);
}
</script>

</body>
</html>
