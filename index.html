<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Jogo 3D - Taylorismo</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px;
      max-width: 300px;
    }
  </style>
</head>
<body>

<div id="info">
  <h3>Taylorismo</h3>
  <p id="texto">
    Use as setas para mover o trabalhador.
  </p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer;
let worker, task;
let speed = 0.1;
let etapa = 0;

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xaaaaaa);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.y = 5;
  camera.position.z = 10;

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Luz
  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5,10,7);
  scene.add(light);

  // Chão
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(50,50),
    new THREE.MeshStandardMaterial({color: 0x555555})
  );
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);

  // Trabalhador
  worker = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({color: 0x00ff00})
  );
  worker.position.y = 1;
  scene.add(worker);

  // Tarefa
  createTask();

  // Controles
  document.addEventListener("keydown", move);
}

function createTask() {
  if(task) scene.remove(task);

  task = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({color: 0xff0000})
  );

  task.position.set(
    Math.random()*10 - 5,
    0.5,
    Math.random()*10 - 5
  );

  scene.add(task);
}

function move(e) {
  switch(e.key) {
    case "ArrowUp": worker.position.z -= speed; break;
    case "ArrowDown": worker.position.z += speed; break;
    case "ArrowLeft": worker.position.x -= speed; break;
    case "ArrowRight": worker.position.x += speed; break;
  }
}

function checkCollision() {
  let dx = worker.position.x - task.position.x;
  let dz = worker.position.z - task.position.z;

  if(Math.sqrt(dx*dx + dz*dz) < 1.5) {
    etapa++;
    mostrarExplicacao();
    createTask();
  }
}

function mostrarExplicacao() {
  let texto = document.getElementById("texto");

  if(etapa === 1) {
    texto.innerHTML = "Taylorismo: sistema criado por Frederick Taylor para aumentar a produtividade.";
  }
  else if(etapa === 2) {
    texto.innerHTML = "Divisão do trabalho: cada trabalhador realiza apenas uma tarefa específica.";
  }
  else if(etapa === 3) {
    texto.innerHTML = "Tempo e movimento: busca pela forma mais rápida de executar tarefas.";
  }
  else if(etapa === 4) {
    texto.innerHTML = "Controle rígido: supervisão constante do trabalhador.";
  }
  else {
    texto.innerHTML = "Parabéns! Você experimentou o trabalho repetitivo do Taylorismo.";
  }
}

function animate() {
  requestAnimationFrame(animate);

  checkCollision();

  renderer.render(scene, camera);
}
</script>

</body>
</html>
