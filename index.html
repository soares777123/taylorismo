<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Quiz Taylorismo</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.quiz-box {
  background: #1f2a38;
  padding: 25px;
  border-radius: 15px;
  width: 600px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  text-align: center;
}

h1 {
  margin-bottom: 10px;
}

.progress {
  margin-bottom: 15px;
  font-size: 14px;
  color: #ccc;
}

.question {
  font-size: 20px;
  margin: 20px 0;
}

.answers button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  background-color: #3498db;
  color: white;
  transition: 0.3s;
}

.answers button:hover {
  background-color: #2980b9;
}

.correct {
  background-color: #2ecc71 !important;
}

.wrong {
  background-color: #e74c3c !important;
}

#nextBtn {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background-color: orange;
  color: black;
  font-weight: bold;
  cursor: pointer;
  display: none;
}

.score {
  margin-top: 15px;
  font-size: 18px;
}

.final {
  font-size: 22px;
}
</style>
</head>

<body>

<div class="quiz-box">
  <h1>📚 Quiz: Taylorismo</h1>
  <div class="progress" id="progress"></div>
  <div class="question" id="question"></div>
  <div class="answers" id="answers"></div>
  <button id="nextBtn">Próxima</button>
  <div class="score" id="score"></div>
</div>

<script>
const quiz = [
  {
    question: "Quem criou o Taylorismo?",
    answers: ["Karl Marx", "Henry Ford", "Frederick Taylor", "Adam Smith"],
    correct: 2
  },
  {
    question: "Qual era o principal objetivo?",
    answers: ["Aumentar o lazer", "Aumentar produtividade", "Diminuir lucro", "Eliminar fábricas"],
    correct: 1
  },
  {
    question: "Taylorismo também é chamado de:",
    answers: ["Produção artesanal", "Administração científica", "Socialismo", "Capitalismo selvagem"],
    correct: 1
  },
  {
    question: "Uma característica do Taylorismo:",
    answers: ["Criatividade livre", "Divisão de tarefas", "Sem hierarquia", "Autonomia total"],
    correct: 1
  },
  {
    question: "No Taylorismo, o trabalhador:",
    answers: ["Planeja tudo", "Só executa tarefas", "Define salário", "Trabalha sem controle"],
    correct: 1
  }
];

let current = 0;
let score = 0;
let respondeuCorreto = false;

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const nextBtn = document.getElementById("nextBtn");
const scoreEl = document.getElementById("score");
const progressEl = document.getElementById("progress");

function showQuestion() {
  respondeuCorreto = false;
  nextBtn.style.display = "none";
  answersEl.innerHTML = "";

  let q = quiz[current];

  progressEl.innerText = "Pergunta " + (current + 1) + " de " + quiz.length;
  questionEl.innerText = q.question;

  q.answers.forEach((answer, index) => {
    const btn = document.createElement("button");
    btn.innerText = answer;

    btn.onclick = () => checkAnswer(btn, index);

    answersEl.appendChild(btn);
  });
}

function checkAnswer(button, index) {
  const correct = quiz[current].correct;

  if (respondeuCorreto) return;

  if (index === correct) {
    button.classList.add("correct");
    score += 10;
    respondeuCorreto = true;
    nextBtn.style.display = "block";
    scoreEl.innerText = "Pontuação: " + score;
  } else {
    button.classList.add("wrong");
    score -= 2; // penalidade pedagógica
    scoreEl.innerText = "Pontuação: " + score;
  }
}

nextBtn.onclick = () => {
  current++;
  if (current < quiz.length) {
    showQuestion();
  } else {
    showFinal();
  }
};

function showFinal() {
  questionEl.innerHTML = "🎉 Fim do Quiz!";
  answersEl.innerHTML = "";
  nextBtn.style.display = "none";

  let mensagem = "";

  if (score >= 40) {
    mensagem = "Excelente! Você domina o Taylorismo.";
  } else if (score >= 25) {
    mensagem = "Bom! Mas ainda pode melhorar.";
  } else {
    mensagem = "Precisa revisar o conteúdo.";
  }

  scoreEl.innerHTML = `<div class="final">Pontuação final: ${score}<br>${mensagem}</div>`;
}

showQuestion();
</script>

</body>
</html>
