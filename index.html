<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Taylorismo 3D - Fábrica</title>

<style>
  body { margin:0; overflow:hidden; font-family: Arial; }

  #info {
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,0.7);
    color:white;
    padding:12px;
    max-width:320px;
    border-radius:8px;
  }
</style>
</head>

<body>

<div id="info">
  <h3>Simulação Taylorista</h3>
  <p id="texto">Movimente-se com W A S D</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let worker, task;
let keys = {};
let etapa = 0;

init();
animate();

function init(){

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight,0.1,1000);
  camera.position.set(0,6,10);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Luz
  const light = new THREE.DirectionalLight(0xffffff,1);
  light.position.set(10,20,10);
  scene.add(light);

  const ambient = new THREE.AmbientLight(0xffffff,0.4);
  scene.add(ambient);

  // TEXTURA DO CHÃO (imagem 1)
  const textureLoader = new THREE.TextureLoader();
  const floorTexture = textureLoader.load('fabrica1.jpg');

  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(60,60),
    new THREE.MeshStandardMaterial({
      map: floorTexture
    })
  );

  floor.rotation.x = -Math.PI/2;
  scene.add(floor);

  // PAINEL HISTÓRICO (imagem 2)
  const wallTexture = textureLoader.load('fabrica2.jpg');

  const wall = new THREE.Mesh(
    new THREE.PlaneGeometry(12,6),
    new THREE.MeshBasicMaterial({ map: wallTexture })
  );

  wall.position.set(0,3,-15);
  scene.add(wall);

  // Trabalhador
  worker = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({color: 0x00ff00})
  );
  worker.position.y = 1;
  scene.add(worker);

  createTask();

  document.addEventListener("keydown", (e)=> keys[e.key.toLowerCase()] = true);
  document.addEventListener("keyup", (e)=> keys[e.key.toLowerCase()] = false);
}

function createTask(){
  if(task) scene.remove(task);

  task = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({color: 0xff0000})
  );

  task.position.set(
    Math.random()*20 -10,
    0.5,
    Math.random()*20 -10
  );

  scene.add(task);
}

function move(){

  let speed = 0.1;

  if(keys["w"]) worker.position.z -= speed;
  if(keys["s"]) worker.position.z += speed;
  if(keys["a"]) worker.position.x -= speed;
  if(keys["d"]) worker.position.x += speed;

  camera.position.x = worker.position.x;
  camera.position.z = worker.position.z + 10;
  camera.lookAt(worker.position);
}

function checkCollision(){

  let dx = worker.position.x - task.position.x;
  let dz = worker.position.z - task.position.z;

  if(Math.sqrt(dx*dx + dz*dz) < 1.5){
    etapa++;
    mostrarTexto();
    createTask();
  }
}

function mostrarTexto(){

  let texto = document.getElementById("texto");

  if(etapa === 1){
    texto.innerHTML = "Observe a fábrica: trabalho repetitivo e organizado.";
  }
  else if(etapa === 2){
    texto.innerHTML = "Cada trabalhador realiza apenas UMA função.";
  }
  else if(etapa === 3){
    texto.innerHTML = "Controle do tempo aumenta a produtividade.";
  }
  else if(etapa === 4){
    texto.innerHTML = "O trabalhador perde autonomia.";
  }
  else{
    texto.innerHTML = "Você vivenciou o Taylorismo na prática.";
  }
}

function animate(){
  requestAnimationFrame(animate);

  move();
  checkCollision();

  renderer.render(scene,camera);
}

</script>

</body>
</html>
